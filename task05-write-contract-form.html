<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 05 - Write Contract Form</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111827; color: #f8fafc; padding: 24px; }
    .panel { background: #1f2937; border-radius: 18px; padding: 24px; max-width: 700px; margin: auto; }
    label { display: block; margin-bottom: 12px; font-weight: bold; }
    input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #f8fafc; }
    button { margin-top: 14px; padding: 12px 18px; border: none; border-radius: 12px; background: #3b82f6; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Task 05: Write Contract Form</h1>
    <p>Foydalanuvchi input orqali kontraktga ma’lumot yuboradigan forma yaratish.</p>
    <form>
      <label for="message">Xabar:</label>
      <input id="message" type="text" placeholder="Masalan: Salom, blockchain!" />
      <button type="submit">Yuborish</button>
    </form>
  </div>
</body>
</html>
